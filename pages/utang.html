<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>MySaku · Daftar Utang</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        // Terapkan mode gelap sebelum halaman dirender, supaya tidak "kedip" putih dulu
        if (localStorage.getItem('mysaku_dark_mode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <style>
        .btn-filter-active {
            background: #0028B3;
            color: white;
        }
        .btn-filter-inactive {
            background: #eef3fe;
            color: #5a6f9a;
        }
        .btn-filter-inactive:hover {
            background: #dce6fa;
        }
        .transaction-enter {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-chat-light text-[#1a2236] antialiased font-body">

    <!-- Header (Kembali ke Laporan) -->
    <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[400px] z-50 header-light flex items-center gap-3 px-4 h-14">
        <a href="/pages/laporan.html" class="flex items-center">
            <span class="material-symbols-outlined text-[#0028B3]">arrow_back</span>
        </a>
        <h1 class="font-extrabold text-xl tracking-tight">
            <span class="text-[#0028B3]">My</span><span class="text-[#1a2236]">Saku</span>
        </h1>
    </header>

    <main class="pt-20 pb-28 px-4 max-w-lg mx-auto space-y-4">

        <!-- Judul Halaman -->
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-[#1a2236]">Daftar Utang</h2>
                <p class="text-sm text-chat-secondary">Semua catatan utang & pelunasan</p>
            </div>
            <div class="bg-[#ffe0e0] px-3 py-1 rounded-full text-xs font-medium text-[#d32f2f]">
                <span id="totalEntriUtang">0</span> entri
            </div>
        </div>

        <!-- Ringkasan Utang (Real-Time) -->
        <div class="grid grid-cols-2 gap-3">
            <div class="chat-card p-4 border-red-200">
                <p class="text-xs text-chat-secondary uppercase tracking-wider">Sisa Utang Saat Ini</p>
                <p class="text-xl font-bold text-[#d32f2f] mt-1" id="sisaUtangAktif">Rp0</p>
            </div>
            <div class="chat-card p-4 border-green-200">
                <p class="text-xs text-chat-secondary uppercase tracking-wider">Total Sudah Dibayar</p>
                <p class="text-xl font-bold text-[#0028B3] mt-1" id="totalDibayar">Rp0</p>
            </div>
        </div>

        <!-- Filter Jenis Entri -->
        <div class="chat-card p-4 space-y-3">
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button class="utang-filter-btn px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap btn-filter-active" data-filter="semua">Semua</button>
                <button class="utang-filter-btn px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap btn-filter-inactive flex items-center gap-1" data-filter="utang">
                    <span class="material-symbols-outlined text-[14px]">arrow_upward</span> Utang Baru
                </button>
                <button class="utang-filter-btn px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap btn-filter-inactive flex items-center gap-1" data-filter="bayar">
                    <span class="material-symbols-outlined text-[14px]">arrow_downward</span> Pelunasan
                </button>
            </div>
        </div>

        <!-- Daftar Entri Utang (Diisi oleh dashboard.js) -->
        <div class="chat-card p-4 space-y-3">
            <div id="utangList" class="space-y-3">
                <!-- Akan diisi JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="emptyStateUtang" class="text-center py-8 hidden">
                <span class="material-symbols-outlined text-4xl text-chat-secondary">account_balance_wallet</span>
                <p class="text-sm text-chat-secondary mt-2">Belum ada catatan utang.</p>
            </div>
        </div>

    </main>

    <!-- MODAL DETAIL UTANG -->
    <div id="debtDetailModal" class="fixed inset-0 bg-black/40 z-[999] hidden items-end justify-center">
        <div class="bg-white w-full max-w-[400px] rounded-t-2xl p-6 pb-8 max-h-[85vh] overflow-y-auto transform transition-transform duration-300 translate-y-full" id="debtDetailSheet">
            <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold text-[#1a2236]">Detail Utang</h3>
                <button id="closeDebtDetail" class="text-chat-secondary">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="debtDetailBody"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
   <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[400px] flex justify-around items-center h-16 px-4 bg-white/95 backdrop-blur-xl border-t border-[#d6e0f5] z-50">
        <a href="/index.html" class="flex flex-col items-center text-[#6a7fa8] hover:text-[#0028B3] transition-colors">
            <span class="material-symbols-outlined">chat_bubble</span>
            <span class="text-[10px] font-medium">Chat</span>
        </a>
        <a href="/pages/laporan.html" class="flex flex-col items-center text-[#6a7fa8] hover:text-[#0028B3] transition-colors">
            <span class="material-symbols-outlined">bar_chart</span>
            <span class="text-[10px] font-medium">Laporan</span>
        </a>
        <a href="/pages/riwayat.html" class="flex flex-col items-center text-[#6a7fa8] hover:text-[#0028B3] transition-colors">
            <span class="material-symbols-outlined">history</span>
            <span class="text-[10px] font-medium">Riwayat</span>
        </a>
        <a href="/pages/pengaturan.html" class="flex flex-col items-center text-[#6a7fa8] hover:text-[#0028B3] transition-colors">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-medium">Pengaturan</span>
        </a>
    </nav>

<script src="../js/dashboard.js"></script>

</body>
</html>
